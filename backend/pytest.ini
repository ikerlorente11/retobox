[pytest]
# Marcadores personalizados.
markers =
    random_sim: tests estadísticos del aleatorio (lentos y no deterministas por
        diseño). NO se ejecutan en la suite normal; córrelos solo cuando cambies
        la lógica de sorteo con:  pytest -m random_sim

# Por defecto se excluyen los tests marcados random_sim (la suite normal queda
# rápida y determinista). Para ejecutarlos: pytest -m random_sim
addopts = -m "not random_sim"
